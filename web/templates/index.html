<!DOCTYPE html>
<html>
<head>
    <title>AI Resource Agent</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        input {
            width: 60%;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
        }

        #result {
            margin-top: 30px;
            background: white;
            padding: 20px;
        }
    </style>
</head>
<body>

<h2>AI Resource Agent</h2>

<input id="url" placeholder="Paste resource link">
<button onclick="process()">Analyze</button>

<div id="result"></div>

<script>

async function process(){

    const url = document.getElementById("url").value

    const res = await fetch("/process",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({url:url})
    })

    const data = await res.json()

    document.getElementById("result").innerText = data.result
}

</script>

</body>
</html>
